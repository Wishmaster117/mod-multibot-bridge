name: Compile against AzerothCore Playerbot

on:
  workflow_dispatch:
    inputs:
      target_os:
        description: "OS à compiler"
        required: true
        default: "linux"
        type: choice
        options:
          - linux
          - windows
          - macos
          - all
      core_ref:
        description: "Branche AzerothCore Playerbot"
        required: true
        default: "Playerbot"
      playerbots_ref:
        description: "Branche mod-playerbots"
        required: true
        default: "master"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target_os }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: Linux / AzerothCore Playerbot
    runs-on: ubuntu-24.04
    if: ${{ inputs.target_os == 'linux' || inputs.target_os == 'all' }}

    steps:
      - name: Checkout AzerothCore Playerbot
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/azerothcore-wotlk
          ref: ${{ inputs.core_ref }}
          path: azerothcore
          submodules: recursive

      - name: Checkout mod-playerbots
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/mod-playerbots
          ref: ${{ inputs.playerbots_ref }}
          path: azerothcore/modules/mod-playerbots

      - name: Checkout mod-multibot-bridge
        uses: actions/checkout@v4
        with:
          path: azerothcore/modules/mod-multibot-bridge

      - name: Verify Playerbots dependency
        shell: bash
        run: |
          test -d azerothcore/modules/mod-playerbots
          find azerothcore/modules/mod-playerbots -name "ChatHelper.h" -print -quit | grep -q .

      - name: Install Linux requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake make gcc g++ clang \
            libmysqlclient-dev libssl-dev libbz2-dev \
            libreadline-dev libncurses-dev mysql-server libboost-all-dev

      - name: Configure CMake
        run: |
          cmake -S azerothcore -B build-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DTOOLS=0

      - name: Build worldserver
        run: |
          cmake --build build-linux --target worldserver --parallel 2

  windows:
    name: Windows / AzerothCore Playerbot
    runs-on: windows-2022
    if: ${{ inputs.target_os == 'windows' || inputs.target_os == 'all' }}

    steps:
      - name: Checkout AzerothCore Playerbot
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/azerothcore-wotlk
          ref: ${{ inputs.core_ref }}
          path: azerothcore
          submodules: recursive

      - name: Checkout mod-playerbots
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/mod-playerbots
          ref: ${{ inputs.playerbots_ref }}
          path: azerothcore/modules/mod-playerbots

      - name: Checkout mod-multibot-bridge
        uses: actions/checkout@v4
        with:
          path: azerothcore/modules/mod-multibot-bridge

      - name: Move repo to short path
        shell: bash
        run: |
          mkdir -p /c/ac
          cp -a azerothcore/. /c/ac/

      - name: Verify Playerbots dependency
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\ac\modules\mod-playerbots")) {
            throw "mod-playerbots was not checked out."
          }

          $chatHelper = Get-ChildItem -Path "C:\ac\modules\mod-playerbots" -Recurse -Filter "ChatHelper.h" -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $chatHelper) {
            throw "ChatHelper.h was not found in mod-playerbots."
          }

          Write-Host "Found ChatHelper.h at: $($chatHelper.FullName)"

      - name: Install Windows requirements
        shell: pwsh
        run: |
          choco install boost-msvc-14.3 -y --no-progress

          $boostRoot = Get-ChildItem -Path "C:\local" -Directory -Filter "boost_*" -ErrorAction SilentlyContinue |
            Sort-Object Name -Descending |
            Select-Object -First 1

          if (-not $boostRoot) {
            throw "Boost was not found under C:\local."
          }

          "BOOST_ROOT=$($boostRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "BOOST_ROOT=$($boostRoot.FullName)"

      - name: Locate or download MySQL dev files
        shell: pwsh
        run: |
          function Find-MySqlDev {
            $roots = @(
              "C:\Program Files\MySQL",
              "C:\tools\mysql",
              "C:\mysql"
            ) | Where-Object { Test-Path $_ }

            foreach ($root in $roots) {
              $header = Get-ChildItem -Path $root -Recurse -Filter "mysql.h" -ErrorAction SilentlyContinue | Select-Object -First 1
              $library = Get-ChildItem -Path $root -Recurse -Filter "libmysql.lib" -ErrorAction SilentlyContinue | Select-Object -First 1

              if ($header -and $library) {
                return [PSCustomObject]@{
                  Include = $header.DirectoryName
                  Library = $library.FullName
                }
              }
            }

            return $null
          }

          $mysql = Find-MySqlDev

          if (-not $mysql) {
            $zipPath = "$env:RUNNER_TEMP\mysql-8.0.46-winx64.zip"
            $extractPath = "C:\mysql"

            Write-Host "MySQL dev files not found. Downloading MySQL 8.0.46 ZIP archive..."
            Invoke-WebRequest `
              -Uri "https://cdn.mysql.com/Downloads/MySQL-8.0/mysql-8.0.46-winx64.zip" `
              -OutFile $zipPath

            New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
            Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

            $mysql = Find-MySqlDev
          }

          if (-not $mysql) {
            throw "Unable to locate MySQL mysql.h and libmysql.lib."
          }

          "MYSQL_INCLUDE_DIR=$($mysql.Include)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MYSQL_LIBRARY=$($mysql.Library)" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "MYSQL_INCLUDE_DIR=$($mysql.Include)"
          Write-Host "MYSQL_LIBRARY=$($mysql.Library)"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S C:\ac -B C:\ac-build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DTOOLS=0 `
            "-DBOOST_ROOT=$env:BOOST_ROOT" `
            "-DMYSQL_INCLUDE_DIR=$env:MYSQL_INCLUDE_DIR" `
            "-DMYSQL_LIBRARY=$env:MYSQL_LIBRARY"

      - name: Build worldserver
        shell: pwsh
        run: |
          cmake --build C:\ac-build --config Release --target worldserver --parallel 2

  macos:
    name: macOS / AzerothCore Playerbot
    runs-on: macos-14
    if: ${{ inputs.target_os == 'macos' || inputs.target_os == 'all' }}

    steps:
      - name: Checkout AzerothCore Playerbot
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/azerothcore-wotlk
          ref: ${{ inputs.core_ref }}
          path: azerothcore
          submodules: recursive

      - name: Checkout mod-playerbots
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/mod-playerbots
          ref: ${{ inputs.playerbots_ref }}
          path: azerothcore/modules/mod-playerbots

      - name: Checkout mod-multibot-bridge
        uses: actions/checkout@v4
        with:
          path: azerothcore/modules/mod-multibot-bridge

      - name: Verify Playerbots dependency
        shell: bash
        run: |
          test -d azerothcore/modules/mod-playerbots
          find azerothcore/modules/mod-playerbots -name "ChatHelper.h" -print -quit | grep -q .

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache:macos-14:${{ github.ref_name }}
          restore-keys: |
            ccache:macos-14:

      - name: Reset ccache stats
        shell: bash
        run: |
          ccache -z || true

      - name: Install latest bash
        run: |
          brew install bash

      - name: Configure macOS requirements
        shell: bash
        working-directory: azerothcore
        run: |
          source ./acore.sh install-deps

      - name: Build
        shell: bash
        working-directory: azerothcore
        run: |
          source ./apps/ci/mac/ci-compile.sh

      - name: ccache stats
        shell: bash
        run: |
          ccache -s || true